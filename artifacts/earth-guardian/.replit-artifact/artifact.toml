kind = "web"
previewPath = "/"
title = "Earth Guardian AI"
version = "1.0.0"
id = "artifacts/earth-guardian"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18892

[services.development]
run = "pnpm --filter @workspace/earth-guardian run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/earth-guardian", "run", "build" ]
publicDir = "artifacts/earth-guardian/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18892"
BASE_PATH = "/"
